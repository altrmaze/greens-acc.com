<!DOCTYPE html>
<html lang="en">
<head>

    <title>GreensACC | Global Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* SIDEBAR PHYSICS */
        #sidebar {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #0B1120;
            z-index: 100;
            position: fixed;
            top: 0;
            height: 100%;
            width: 18rem;
        }
        .sidebar-hidden { transform: translateX(-100%); left: 0; }
        [dir="rtl"] #sidebar { right: 0; left: auto; }
        [dir="rtl"] .sidebar-hidden { transform: translateX(100%); }

        /* STOCK TICKER */
        .ticker-wrap { background: #000; color: #fff; height: 35px; overflow: hidden; position: fixed; bottom: 0; width: 100%; z-index: 50; border-top: 1px solid #333; }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 45s linear infinite; line-height: 35px; font-family: monospace; font-size: 12px; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* MINI-MENU MODAL */
        .modal-active { display: flex !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
