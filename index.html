<div class="pt-4 border-t border-gray-700">
    <button onclick="signInWithGoogle()" class="w-full mb-2 bg-white text-black p-2 rounded-lg text-xs font-bold flex items-center justify-center gap-2">
        <img src="https://www.google.com/favicon.ico" class="w-4"> Login with Google
    </button>
    <button onclick="signInWithApple()" class="w-full bg-gray-800 text-white p-2 rounded-lg text-xs font-bold flex items-center justify-center gap-2">
        <img src="https://www.apple.com/favicon.ico" class="w-4"> Login with Apple
    </button>
</div>

<div id="insightCard" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-6">
    <div class="bg-white rounded-3xl w-full max-w-2xl p-8 shadow-2xl relative">
        <button onclick="closeInsight()" class="absolute top-4 right-4 text-2xl">×</button>
        <div class="flex items-center gap-4 mb-6">
            <div id="compLogo" class="w-16 h-16 bg-gray-100 rounded-2xl flex items-center justify-center text-2xl">🏙️</div>
            <div>
                <h2 id="compName" class="text-2xl font-bold">Company Name</h2>
                <p class="text-xs text-green-600 font-bold uppercase tracking-widest">Global Market Intelligence</p>
            </div>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-blue-50 p-4 rounded-2xl">
                <p class="text-[10px] uppercase font-bold text-blue-400">Amazon Sales Share</p>
                <p id="amazonStat" class="text-xl font-bold">42%</p>
            </div>
            <div class="bg-orange-50 p-4 rounded-2xl">
                <p class="text-[10px] uppercase font-bold text-orange-400">Alibaba/AliExpress</p>
                <p id="alibabaStat" class="text-xl font-bold">18%</p>
            </div>
        </div>

        <div class="mt-6 border-t pt-6">
            <p class="text-xs font-bold mb-2 uppercase text-gray-400">Reputation & Reviews</p>
            <div class="flex gap-1 text-yellow-400 mb-2">★★★★★</div>
            <p class="text-sm text-gray-600">High trust rating. Verified battery manufacturing compliance in 14 regions.</p>
        </div>
    </div>
</div>

<script>
    // 1. ANALYTICS: Track visitors in Admin Page
    async function trackVisitor() {
        // This sends a hit to your Supabase 'analytics' table
        const { data, error } = await supabase
            .from('site_stats')
            .insert([{ event: 'page_view', timestamp: new Date() }]);
    }
    window.onload = trackVisitor;

    // 2. COMPANY DATA FETCH (Simulated Intelligence)
    function showCompanyIntelligence(name) {
        document.getElementById('compName').innerText = name;
        // In a real app, you fetch this data from an API (like Amazon Associate API or similar)
        document.getElementById('amazonStat').innerText = (Math.random() * 50 + 10).toFixed(1) + "%";
        document.getElementById('alibabaStat').innerText = (Math.random() * 30 + 5).toFixed(1) + "%";
        
        document.getElementById('insightCard').classList.remove('hidden');
    }

    function closeInsight() {
        document.getElementById('insightCard').classList.add('hidden');
    }

    // 3. AUTHENTICATION (Google/Apple)
    async function signInWithGoogle() {
        const { data, error } = await supabase.auth.signInWithOAuth({
            provider: 'google',
        });
    }

    async function signInWithApple() {
        const { data, error } = await supabase.auth.signInWithOAuth({
            provider: 'apple',
        });
    }

    // 4. ADMIN DASHBOARD STATS
    async function loadAdminStats() {
        const { count, error } = await supabase
            .from('site_stats')
            .select('*', { count: 'exact', head: true });
        
        console.log("Total Visitors Today: " + count);
        // You can display this 'count' in your Admin UI
    }
</script>
