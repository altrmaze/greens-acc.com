<html lang="en">

    <title>GreensACC - Trading System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth Slide Back Animation */
        #sidebar { 
            transition: transform 0.3s ease-in-out; 
            z-index: 100; 
        }
        .sidebar-closed { transform: translateX(-100%); }
        
        /* Font visibility for the blue sidebar */
        .sidebar-link { 
            color: #ffffff !important; 
            font-weight: 500;
        }
    </style>
</head>

        <div class="p-6">
            <h1 class="text-white font-bold text-2xl mb-8 flex items-center gap-2">
                <span class="text-green-400">🍃</span> GreensACC
            </h1>

                        <option value="">Select...</option>
                        <option value="Egypt">Egypt</option>
                        <option value="Turkey">Turkey</option>
                        <option value="UAE">UAE</option>
                        <option value="USA">USA</option>
                    </select>

            </nav>
        </div>
    </div>

        </header>
