<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreensACC - General Trading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 1. SIDEBAR SLIDE EFFECT */
        #sidebar {
            transition: transform 0.3s ease-in-out;
            z-index: 50;
            background-color: #0B1120; /* Your Dark Blue */
        }
        /* Start hidden (off-screen) */
        .sidebar-hidden { transform: translateX(-100%); }
        
        /* 2. FONT VISIBILITY */
        .sidebar-link {
            color: #FFFFFF !important;
            font-weight: 500;
            opacity: 0.9;
        }
        .sidebar-link:hover { opacity: 1; background: rgba(255,255,255,0.1); }

        /* RTL Support for Arabic */
        [dir="rtl"] .sidebar-hidden { transform: translateX(100%); }
    </style>
</head>
<body class="bg-gray-50">

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/10 hidden z-40"></div>

    <div id="sidebar" class="fixed top-0 left-0 h-full w-64 sidebar-hidden shadow-2xl">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-8">
                <div class="bg-green-500 p-2 rounded-lg text-white">GB</div>
                <h2 class="text-white font-bold text-xl">GreensACC</h2>
            </div>
            
            <nav class="space-y-4">
                <a href="#" class="sidebar-link block p-2 rounded">Overview</a>
                <a href="#" class="sidebar-link block p-2 rounded">Partner Registry</a>
                <a href="#" class="sidebar-link block p-2 rounded">Stock Control</a>
                
                <div class="mt-10 border-t border-gray-700 pt-6">
                    <label class="text-gray-400 text-xs uppercase">Choose Country</label>
                    <select id="countrySelect" onchange="processGlobalSetup()" class="w-full mt-2 bg-[#1a2234] text-white border border-gray-600 rounded p-2 text-sm outline-none">
                        <option value="">Select Region...</option>
                        <option value="Egypt">Egypt</option>
                        <option value="Turkey">Turkey</option>
                        <option value="UAE">UAE</option>
                        <option value="USA">USA</option>
                    </select>
                </div>
            </nav>
        </div>
    </div>

    <div class="min-h-screen flex flex-col">
        <header class="bg-white border-b p-4 flex justify-between items-center shadow-sm">
            <button onclick="toggleSidebar()" class="text-2xl hover:bg-gray-100 p-2 rounded">☰</button>
            <div id="navDisplay" class="text-sm font-bold text-blue-600">Global Operations</div>
            <button onclick="window.print()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm">Print</button>
        </header>

        <main class="p-6 flex-grow">
            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                    <h3 class="font-bold">Active Records</h3>
                    <div class="space-x-2">
                        <button class="text-blue-600 font-bold border border-blue-600 px-3 py-1 rounded hover:bg-blue-50">Modify</button>
                        <button class="text-red-600 font-bold border border-red-600 px-3 py-1 rounded hover:bg-red-50">Delete</button>
                    </div>
                </div>
                <div class="p-8 text-center text-gray-400">
                    Select a country from the sidebar to begin managing data.
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            
            sidebar.classList.toggle('sidebar-hidden');
            overlay.classList.toggle('hidden');
        }

        function processGlobalSetup() {
            const country = document.getElementById('countrySelect').value;
            if (!country) return;

            // Set default local language names
            let localName = "Local Language";
            if (country === "Egypt" || country === "UAE") localName = "Arabic";
            if (country === "Turkey") localName = "Turkish";

            // ASK LANGUAGE
            const useLocal = confirm(`Would you like to use ${localName}? (Cancel for English)`);
            
            // ASK CURRENCY
            const useLocalCurr = confirm(`Use ${country} Local Currency? (Cancel for USD)`);

            // Apply Direction
            if (useLocal && (country === "Egypt" || country === "UAE")) {
                document.body.dir = "rtl";
            } else {
                document.body.dir = "ltr";
            }

            // Update Header Information
            document.getElementById('navDisplay').innerText = 
                `${country} | ${useLocal ? localName : 'English'} | ${useLocalCurr ? 'Local' : 'USD'}`;

            // SLIDE SIDEBAR BACK AUTOMATICALLY
            toggleSidebar();
        }
    </script>
</body>
</html>
