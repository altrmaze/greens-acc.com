<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Compliance & Corporate Trading Portal</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --primary-color: #0f172a;
            --danger-color: #b91c1c;
            --danger-bg: #fef2f2;
            --accent-color: #2563eb;
            --border-color: #e2e8f0;
            --success-color: #16a34a;
            --success-bg: #f0fdf4;
            --success-border: #bbf7d0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }

        .portal-wrapper {
            max-width: 850px;
            margin: 0 auto;
        }

        /* Portal Entry Dashboard */
        .portal-dashboard {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            text-align: center;
            margin-bottom: 30px;
        }

        .portal-dashboard h1 {
            color: var(--primary-color);
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
