name: Frontend Production Deployment

on:
  push:
    branches:
      - main
      - master
    paths:
      - '*.html'
      - '*.css'
      - '*.js'
      - 'CNAME'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pages-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_TEST_USER_EMAIL: ${{ secrets.SUPABASE_TEST_EMAIL }}
      VITE_TEST_USER_PASSWORD: ${{ secrets.SUPABASE_TEST_PASSWORD }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Validation
        run: npm test

      - name: Build Frontend
        env:
          VITE_APP_PASS: ${{ secrets.VITE_APP_PASS }}
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
