# Trigger marker for workflow path filter.
# Trigger marker 2 for workflow path filter.
name: Supabase Production Deployment

on:
  pull_request:
    branches:
      - main
    paths:
      - 'supabase/**'
      - '.github/workflows/deploy.yml'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - '.github/workflows/deploy.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Code Linting & Tests
        run: npm test

  supabase-dry-run:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: validate-and-test
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify Database Migrations (Dry Run)
        run: |
          REF="${SUPABASE_PROJECT_ID:-${SUPABASE_PROJECT_REF:-}}"
          if [ -n "$REF" ]; then
            supabase db lint --project-ref "$REF"
          else
            supabase db lint
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

  deploy-to-production:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [validate-and-test]
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Resolve Project Ref
        id: project
        run: |
          # Accept either SUPABASE_PROJECT_ID (preferred) or the legacy SUPABASE_PROJECT_REF
          REF="${SUPABASE_PROJECT_ID:-${SUPABASE_PROJECT_REF:-}}"
          if [ -z "$REF" ]; then
            echo "ERROR: set SUPABASE_PROJECT_ID (or SUPABASE_PROJECT_REF) in GitHub secrets."
            exit 1
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Push Runtime Secrets to Edge Functions
        run: |
          set -euo pipefail
          supabase secrets set \
            SUPABASE_URL="$SUPABASE_URL" \
            SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
            --project-ref "${{ steps.project.outputs.ref }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Deploy Supabase Edge Functions
        run: |
          set -euo pipefail
          for f in supabase/functions/*.js; do
            name="$(basename "$f" .js)"
            echo "Deploying function: $name"
            supabase functions deploy "$name" --project-ref "${{ steps.project.outputs.ref }}"
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push Database Changes to Production
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "SUPABASE_DB_PASSWORD is not configured; skipping db push."
            exit 0
          fi
          supabase db push --project-ref "${{ steps.project.outputs.ref }}" --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
