name: Devin AI On-Standby Enterprise Monitor
on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  devin_orchestrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Devin AI — Status Check + Full Build + Live Deploy
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
        run: |
          PROMPT="## GREENS ACC — DEVIN DIRECTIVE: STATUS CHECK + STABILIZATION

          Platform identity: Greens ACC (greens-acc.com). Repository: https://github.com/altrmaze/greens-acc.com

          ### ARCHITECTURE (Phase 7 — DO NOT REGRESS)
          - Authentication: Supabase Auth (email+password via supabase.auth.signInWithPassword)
          - Role lookup: server-side from the 'profiles' table (never from JWT claims or env vars)
          - RBAC: AdminRoute (admin role) and DeveloperRoute (developer or admin role) in src/components/
          - Login page: src/pages/Login.jsx — uses Supabase, redirects by role via defaultRedirectForRole()
          - Public entry: src/pages/UnderConstruction.jsx (/) — redirects authenticated users
          - Admin panel: /dashboard — AdminRoute protected, AdminControlRoom + nested sections
          - Dev panel: /dev-dashboard — DeveloperRoute protected
          - CRITICAL: Do NOT use sessionStorage for auth, do NOT validate against VITE_* env var credentials
          - CRITICAL: Admin credentials are NEVER embedded in the frontend bundle

          ### STEP 1 — CHECK LIVE STATUS
          - Visit https://altrmaze.github.io/greens-acc.com or https://greens-acc.com
          - Report: Is a live deployment currently active? What is the URL? What is currently visible?
          - If NOT live: state the exact blocker/error preventing deployment.

          ### STEP 2 — VALIDATE BUILD + TESTS
          - Run: npm install && npm test && npm run build
          - Fix any errors found; do not remove or skip existing tests
          - Ensure the build produces dist/index.html + dist/assets/

          ### STEP 3 — REPORT BACK
          After completing, reply with:
          1. Live URL confirmation
          2. Any errors encountered and how they were fixed
          3. Confirmation that tests pass and build succeeds"

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "https://api.devin.ai/v1/sessions" \
            -H "Authorization: Bearer $DEVIN_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"prompt\": $(echo "$PROMPT" | jq -Rs .), \"unlisted\": false}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "::error::Devin API call failed with status $HTTP_STATUS"
            exit 1
          fi

          SESSION_URL=$(echo "$BODY" | jq -r '.url // .session_url // empty')
          if [ -n "$SESSION_URL" ]; then
            echo "::notice::Devin session started: $SESSION_URL"
          fi
