name: Devin AI Autonomous Engineering Monitor
on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  devin_orchestrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Notify Devin AI Autonomous Leader via Secure Secrets Vault
        uses: devin-ai/devin-action@v1
        with:
          api-key: ${{ secrets.DEVIN_API_KEY }}
          prompt: |
            "IGNORE ALL PREVIOUS CODE HISTORIES TO AVOID CONFUSION. Act as the Software Engineering Leader for Greens ACC starting completely fresh from PROJECT_ORCHESTRATION.md. Thoroughly check the entire workspace. Lock down the main entry view with a secure authentication gate to prevent public access. Build the core Dashboard environment pattern, linking the frontend views to the Supabase backend. Integrate employee environment provisioning tools, customer behavior trackers, system metrics monitoring, and automated auditing systems. Enforce the 0.995 safety consensus threshold and display its metrics on the dashboard UI. Build the self-healing pipeline reconnection monitor to watch and automatically fix broken frontend-backend connections. Configure the persistent GitHub Codespace workflow sync. Once structural items match and code fixes are complete, deploy everything immediately."
