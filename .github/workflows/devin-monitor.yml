name: Devin Autonomous Engineering Monitor
on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  devin_heal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Notify Devin Autonomous Leader
        uses: devin-ai/devin-action@v1
        with:
          api-key: ${{ secrets.DEVIN_API_KEY }}
          prompt: |
            "Act as the Software Engineering Leader for Greens ACC. Review the latest commit. Monitor the page decoupling progress. If any build errors or Tailwind compilation issues arise, write the fix, use Copilot tools to regenerate the files, test the 0.995 consensus algorithm logic, and force deploy to our production environment."
