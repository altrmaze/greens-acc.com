name: Devin AI On-Standby Enterprise Monitor
on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  devin_orchestrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Devin AI — Status Check + Full Build + Live Deploy
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
        run: |
          PROMPT="## GREENS ACC — DEVIN DIRECTIVE: STATUS + BUILD + LIVE DEPLOY

          Platform identity: Greens ACC (greens-acc.com). Repository: https://github.com/altrmaze/greens-acc.com

          ### STEP 1 — CHECK LIVE STATUS
          - Visit https://altrmaze.github.io/greens-acc.com or https://greens-acc.com
          - Report: Is a live deployment currently active? What is the URL? What is currently visible?
          - If NOT live: state the exact blocker/error preventing deployment.

          ### STEP 2 — CREDENTIALS
          - Admin credentials are in GitHub Secrets: greensacc_admin_username and greensacc_admin_password
          - These are already injected into the build as VITE_ADMIN_USERNAME and VITE_ADMIN_PASSWORD via pages-deploy.yml
          - Use import.meta.env.VITE_ADMIN_USERNAME and import.meta.env.VITE_ADMIN_PASSWORD in frontend code

          ### STEP 3 — EXECUTE 3-PHASE BUILD (if not already complete)

          Phase 1 — Login Gate (src/pages/LoginGate.jsx + src/App.jsx)
          - Full-screen login page: country selector, language selector, username input, password input, Entry to my Website button
          - Validates against import.meta.env.VITE_ADMIN_USERNAME / VITE_ADMIN_PASSWORD
          - On success: set sessionStorage greens_auth=true, redirect to /dashboard
          - On failure: show error, block access
          - All routes in App.jsx protected: redirect to /login if greens_auth not set

          Phase 2 — 6-Panel Master Dashboard (src/pages/Dashboard.jsx)
          - Panel A: Employee provisioning — list users from Supabase, add user form
          - Panel B: Customer activity telemetry — live feed from ai_transaction_logs table
          - Panel C: 5 Presidential AI cards (Legal, Security, Logistics, Finance, Media) + Executive Secretary summary
          - Panel D: 0.995 safety score — animated progress bar, RED alert if below 99.5%
          - Panel E: Self-healing pipeline tracker — status grid, auto-POST to /functions/v1/self-heal if BROKEN
          - Panel F: Ops bar — username, UTC clock, Force Heal All, Logout

          Phase 3 — Backend + Deploy
          - Create supabase/migrations/ files for any missing tables (presidential_ai_status, pipeline_status)
          - Create supabase/functions/self-heal/index.js edge function
          - Run npm test and npm run build — fix ALL errors
          - Commit with message: feat: greens-acc full dashboard + login gate + Supabase bind [Devin]
          - Push to main — triggers pages-deploy.yml for live GitHub Pages deployment

          ### STEP 4 — REPORT BACK
          After completing, reply with:
          1. Live URL confirmation
          2. List of files created/modified
          3. Any errors encountered and how they were fixed
          4. Confirmation that the 3-phase build is complete and live"

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "https://api.devin.ai/v1/sessions" \
            -H "Authorization: Bearer $DEVIN_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"prompt\": $(echo "$PROMPT" | jq -Rs .), \"unlisted\": false}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "::error::Devin API call failed with status $HTTP_STATUS"
            exit 1
          fi

          SESSION_URL=$(echo "$BODY" | jq -r '.url // .session_url // empty')
          if [ -n "$SESSION_URL" ]; then
            echo "::notice::Devin session started: $SESSION_URL"
          fi
