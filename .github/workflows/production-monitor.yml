name: Greens ACC Production Environment Monitor
on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js & Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Execute Native Verification & Build
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Executing native workspace verification from PROJECT_ORCHESTRATION.md..."
          echo "Ensuring complete amnesia of old single-page assets..."
          npm install
          npm run build
