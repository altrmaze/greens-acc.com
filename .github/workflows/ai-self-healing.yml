name: AI Execution

on:
  workflow_dispatch:
  push:
    branches:
      - test-self-healing

permissions:
  contents: write
  pull-requests: write

jobs:
  ai_execution:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run AI Agent Execution
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m agents.execute \
            --auto-approve=true \
            --skip-proposal-blockage=true \
            --kickoff="runtime baseline PR"
