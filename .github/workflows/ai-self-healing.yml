name: AI Self-Healing and Execution Pipeline

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

jobs:
  agent-execution:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install System and Platform Dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the local workspace or agent package explicitly to register commands
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Install in editable mode if 'agents' is a local directory with a setup.py/pyproject.toml
          if [ -f setup.py ] || [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Verify Environment and Modules
        run: |
          python -c "import agents; print('Agents module successfully verified.')"

      - name: Autonomous Agent Execution Context
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # The agent now runs with full environment clearance and zero prompts
          python -c "import agents; agents.execute()"
