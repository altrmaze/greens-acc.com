name: AI Self-Healing Loop

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ai_healing:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Verification Tools
        run: pip install flake8 pytest supabase requests

      - name: Run System Validation
        id: run_tests
        run: |
          echo "Checking codebase health..."
          rm -f .status

          if [ -d tests ]; then
            pytest tests/ > test_log.txt 2>&1 || echo "failed" > .status
          else
            echo "No tests directory found." > test_log.txt
          fi

          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics > lint_log.txt 2>&1 || echo "failed" > .status

      - name: Route Failure to AI Agents
        if: hashFiles('.status') != ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚨 Structural degradation detected. Bypassing human administrator."
          python - <<'PY'
          import os
          import subprocess
          import requests

          def read_log(path):
            if not os.path.exists(path):
              return ""
            with open(path, "r", encoding="utf-8", errors="replace") as f:
              return f.read()

          test_log = read_log("test_log.txt")
          lint_log = read_log("lint_log.txt")
          error_payload = (test_log + "\n" + lint_log).replace('"', "'")

          url = f"{os.environ['SUPABASE_URL']}/rest/v1/agent_telemetry"
          headers = {
            "apikey": os.environ["SUPABASE_SERVICE_ROLE_KEY"],
            "Authorization": "Bearer " + os.environ["SUPABASE_SERVICE_ROLE_KEY"],
            "Content-Type": "application/json",
            "Prefer": "return=minimal",
          }
          payload = {
            "event_type": "SYSTEM_DEGRADATION",
            "error_log": error_payload,
            "status": "triggered_self_healing",
          }

          response = requests.post(url, json=payload, headers=headers, timeout=30)
          print("Agent Orchestrator Notified:", response.status_code)

          if os.path.exists("scripts/self_heal.py"):
            print("Initiating agentic monolith consensus healing loop...")
            subprocess.run(["python", "scripts/self_heal.py"], check=False)
          else:
            print("No scripts/self_heal.py found. Skipping self-heal script execution.")
          PY
