version: '3.8'

services:
  backend_api:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install fastapi uvicorn pydantic stripe supabase && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./backend:/app
    environment:
      - STRIPE_SECRET_KEY=sk_test_placeholder_key
      - STRIPE_WEBHOOK_SECRET=whsec_placeholder_secret
    ports:
      - '8000:8000'
    restart: always

  frontend_client:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install -g serve && serve -s build -l 3000"
    volumes:
      - ./frontend/build:/app/build
    ports:
      - '3000:3000'
    restart: always
