<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Greens ACC</title>
  <script>
    /**
     * GitHub Pages SPA fallback.
     *
     * GitHub Pages returns this 404 page for any URL that does not match a
     * real file in the deployment.  This script immediately redirects the
     * browser to the React SPA (index.html) with the original pathname
     * encoded as a hash fragment so HashRouter can restore the route.
     *
     * Example:  /dashboard  →  /#/dashboard
     *           /login       →  /#/login
     */
    (function () {
      var l = window.location;
      var origin = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '');
      var path   = l.pathname.replace(/\/$/, '');
      var searchPayload = l.search ? l.search.slice(1) : '';
      var hashPayload = l.hash ? l.hash.slice(1) : '';
      var isRecoveryPayload = function (value) {
        return /(^|[?&])(type=recovery|code=|token_hash=|access_token=|refresh_token=)/.test(value || '');
      };
      var recoveryPayload = isRecoveryPayload(searchPayload)
        ? searchPayload
        : isRecoveryPayload(hashPayload)
          ? hashPayload
          : '';

      if (recoveryPayload) {
        try {
          window.sessionStorage.setItem('supabase-recovery-hash', recoveryPayload);
        } catch (err) {
          // Ignore storage failures and keep the redirect flow working.
        }
        l.replace(origin + '/#' + (path || '/'));
        return;
      }

      l.replace(origin + '/#' + (path || '/') + l.search);
    })();
  </script>
</head>
<body></body>
</html>
